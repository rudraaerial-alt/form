
services:
  - type: web
    name: pe-form-app
    runtime: python
    plan: starter
    autoDeployTrigger: commit

    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --bind 0.0.0.0:$PORT --workers 1 --threads 4 --timeout 600 main_form_fixed:app

    healthCheckPath: /health

    envVars:
      - key: PYTHON_VERSION
        value: 3.13.5
      - key: DATABASE_URL
        sync: false
      - key: PYTHONUNBUFFERED
        value: "1"



