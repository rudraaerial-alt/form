name: Deploy to Render

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Debug secret presence
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$RENDER_DEPLOY_HOOK_URL" ]; then
            echo "Secret is empty or missing"
            exit 1
          fi

          echo "Secret length: ${#RENDER_DEPLOY_HOOK_URL}"

          case "$RENDER_DEPLOY_HOOK_URL" in
            https://api.render.com/deploy/*) echo "Looks like a Render deploy hook URL" ;;
            *) echo "Secret exists, but format does not look like a Render deploy hook URL"; exit 1 ;;
          esac

      - name: Trigger Render deploy
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        run: |
          curl -fsSL "$RENDER_DEPLOY_HOOK_URL"
