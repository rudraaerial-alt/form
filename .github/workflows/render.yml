services:
  - type: web
    name: pe-form-app
    runtime: python
    plan: starter
    autoDeployTrigger: commit
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --workers 1 --threads 4 --timeout 120 app:app
    envVars:
      - key: DATA_DIR
        value: /var/data
      - key: PYTHONUNBUFFERED
        value: "1"
    disk:
      name: pe-form-data
      mountPath: /var/data
      sizeGB: 1
